<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulmate Bond Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: #fff5f7;
            overflow-x: hidden;
        }

        .romantic-font {
            font-family: 'Dancing Script', cursive;
        }

        .heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.3);
            animation: float 6s infinite linear;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .loading-heart {
            animation: pulse-heart 1s infinite alternate;
        }

        @keyframes pulse-heart {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .monkey-shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Floating Hearts Background -->
    <div id="hearts-container"></div>

    <div id="main-card" class="glass w-full max-w-md rounded-3xl shadow-2xl p-8 text-center transition-all duration-500">
        
        <!-- UI State 1: Input -->
        <div id="input-state">
            <i class="fas fa-heart text-5xl text-pink-500 mb-4 animate-bounce"></i>
            <h1 class="romantic-font text-4xl mb-2 gradient-text">True Love Calculator</h1>
            <p class="text-gray-500 text-sm mb-8">Discover the cosmic strength of your bond</p>

            <div class="space-y-4 mb-8">
                <div class="relative">
                    <span class="absolute left-4 top-3 text-pink-400"><i class="fas fa-mars"></i></span>
                    <input type="text" id="bfName" placeholder="Boyfriend's Name" 
                        class="w-full pl-12 pr-4 py-3 rounded-full border-2 border-pink-100 focus:border-pink-400 outline-none transition-all">
                </div>
                <div class="text-pink-300 font-bold">♥</div>
                <div class="relative">
                    <span class="absolute left-4 top-3 text-pink-400"><i class="fas fa-venus"></i></span>
                    <input type="text" id="gfName" placeholder="Girlfriend's Name" 
                        class="w-full pl-12 pr-4 py-3 rounded-full border-2 border-pink-100 focus:border-pink-400 outline-none transition-all">
                </div>
            </div>

            <button onclick="startCalculation()" class="w-full bg-gradient-to-r from-pink-500 to-red-500 text-white font-bold py-3 rounded-full shadow-lg hover:shadow-pink-200 hover:scale-105 active:scale-95 transition-all">
                CALCULATE BOND %
            </button>
        </div>

        <!-- UI State 2: Loading -->
        <div id="loading-state" class="hidden">
            <div class="loading-heart text-7xl text-red-500 mb-6">❤️</div>
            <h2 class="text-2xl font-bold text-gray-700 mb-2">Analyzing Destinies...</h2>
            <p id="loading-text" class="text-pink-500 italic">Matching heartbeats...</p>
            
            <div class="w-full bg-pink-100 h-3 rounded-full mt-8 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-pink-500 to-red-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- UI State 3: The Prank -->
        <div id="prank-state" class="hidden">
            <div class="text-8xl mb-4 monkey-shake">🐵</div>
            <h1 class="text-3xl font-black text-red-600 mb-4">Erripuuuu! 🤡</h1>
            
            <div class="space-y-6 bg-yellow-50 p-6 rounded-2xl border-2 border-dashed border-yellow-400">
                <p class="text-xl font-bold text-gray-800 leading-relaxed">
                    "Yem ra balraju , yem upayogam ra deshaniki ee valla"
                </p>
                <div class="h-px bg-yellow-200 w-full"></div>
                <p class="text-2xl font-black text-blue-600 uppercase tracking-wider">
                    Chadhuvko ra Venkat Sai!
                </p>
            </div>

            <button onclick="resetApp()" class="mt-8 text-gray-400 hover:text-gray-600 text-sm underline transition-all">
                Try again (if you dare)
            </button>
        </div>
    </div>

    <script>
        // Create floating background hearts
        function createHearts() {
            const container = document.getElementById('hearts-container');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart fas fa-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                container.appendChild(heart);
            }
        }
        createHearts();

        const loadingMessages = [
            "Calculating bond percentage...",
            "Consulting the stars...",
            "Checking compatibility scores...",
            "Syncing soul frequencies...",
            "Almost there, lover boy..."
        ];

        function startCalculation() {
            const bf = document.getElementById('bfName').value.trim();
            const gf = document.getElementById('gfName').value.trim();

            if (!bf || !gf) {
                alert("Please enter both names to find your true love! ❤️");
                return;
            }

            // Switch to loading state
            document.getElementById('input-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            let progress = 0;
            const progressBar = document.getElementById('progress-bar');
            const loadingText = document.getElementById('loading-text');

            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = progress + '%';
                
                // Change message randomly
                if (Math.random() > 0.7) {
                    loadingText.innerText = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
                }

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(showPrank, 500);
                }
            }, 400);
        }

        function showPrank() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('prank-state').classList.remove('hidden');
            
            // Change card style for prank
            const card = document.getElementById('main-card');
            card.classList.remove('glass');
            card.style.background = "#fff";
            card.style.borderColor = "#ff0000";
            
            // Shake the whole screen briefly
            document.body.classList.add('bg-yellow-100');
        }

        function resetApp() {
            location.reload();
        }
    </script>
</body>
</html>
